# Instrumenten-Mapping für noten-tools
#
# Format:
#   <code>:
#     <normalname>:
#       aliases: [liste, von, schreibweisen]
#       keep_original_name: true|false   # optional, default false
#                                        # (wenn true, wird der OCR-Originalname als Instrumentenname
#                                        #  übernommen statt 'normalname' — z.B. für Schlagwerk)
#
# Codes:
#   00 — Direktion / Partitur / Score
#   01 — Flöten & Piccolo
#   02 — Oboe, Fagott und andere Doppelrohrbläser
#   03 — Klarinetten (alle Arten)
#   04 — Saxophone (alle Arten)
#   05 — Hörner
#   06 — Trompeten, Flügelhörner, Kornette
#   07 — Tenorhörner, Bariton, Euphonium
#   08 — Posaunen
#   09 — Tuben & Bässe
#   10 — Schlagwerk
#   11 — Streicher und Sonstiges

