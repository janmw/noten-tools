site_name: noten-tools
site_description: CLI-Tools für die Notenwart-Arbeit
repo_url: https://github.com/janmw/noten-tools
repo_name: janmw/noten-tools
edit_uri: edit/main/docs/

theme:
  name: catppuccin
  custom_dir: overrides
  language: de
  logo: assets/logo-light.svg
  favicon: assets/logo.svg
  palette:
    - scheme: macchiato
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-partly-cloudy
        name: Wechsel zu Mocha
    - scheme: mocha
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Wechsel zu Latte
    - scheme: latte
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Wechsel zu Frappé
    - scheme: frappe
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-cloudy
        name: Wechsel zu Macchiato
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/catppuccin.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Start: index.md
  - Loslegen:
    - loslegen/index.md
    - Installation: loslegen/installation.md
    - Konfiguration: loslegen/konfiguration.md
    - Erste Schritte: loslegen/erste-schritte.md
  - Anwendung:
    - anwendung/index.md
    - Notensatz aufbereiten: anwendung/notensatz.md
    - Booklets auflösen: anwendung/booklets.md
    - PDFs reparieren: anwendung/pdf-reparieren.md
    - Stimmen stempeln: anwendung/stempeln.md
    - Ausgabe-Vermerk: anwendung/ausgabe.md
    - OCR-Aliase pflegen: anwendung/aliase.md
  - Notenarchiv aufbauen:
    - archiv/index.md
    - Archivnummern & Codes: archiv/nummern-und-codes.md
    - Naming-Konventionen: archiv/naming.md
    - Ordnerstruktur: archiv/ordnerstruktur.md
    - Scannen: archiv/scannen.md
    - Backup-Strategie: archiv/backup.md
  - Entwicklung:
    - entwicklung/index.md
    - Setup & Tests: entwicklung/setup.md
    - Dokumentation: entwicklung/doku.md
    - Repo-Struktur: entwicklung/repo.md
